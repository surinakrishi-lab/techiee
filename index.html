<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossTecch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: clip;
            background: #e8eaf2;
        }
        /* iframe ke baseline/inline gap se bachne ke liye */

        iframe {
            display: block;
            vertical-align: top;
            border: 0;
        }
        /* Mobile: smooth scroll + momentum, theme bg taaki kahin white na jhanke */

        @media (max-width: 860px) {
            html {
                scroll-behavior: smooth;
            }
            body {
                background: #e8eaf2;
            }
            .section-frame {
                background: #e8eaf2;
            }
        }
        /* Har section ek seamless iframe hai.
       Edit karna ho to seedha us section ki .html file (index_files/) kholo. */

        .section-frame {
            display: block;
            width: 100%;
            border: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 600px;
            /* default; JS sahi height set karega */
        }
        /* Flow section = scroll-driven pinned track.
       Jaise page neeche scroll ho, andar ki pipeline horizontally aage badhti hai. */

        .flow-pin {
            position: relative;
            width: 100%;
        }

        .flow-pin .flow-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: block;
            border: 0;
        }

        @media (max-width: 860px) {
            .flow-pin {
                height: auto !important;
            }
            .flow-pin .flow-frame {
                position: static;
                height: auto;
            }
        }
        /* Services section = same pin technique as Flow.
       Section locks on screen; scrolling steps through the cards one by one.
       (Only the active index is pushed in, and only when it actually changes,
       so this stays cheap and doesn't stutter.) */

        .services-pin {
            position: relative;
            width: 100%;
        }

        .services-pin .services-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: block;
            border: 0;
        }

        @media (max-width: 900px) {
            .services-pin {
                height: auto !important;
            }
            .services-pin .services-frame {
                position: static;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <!-- ===== SECTION SEQUENCE (order yahan se control hota hai) ===== -->
    <!-- 1 --><iframe class="section-frame" src="index_files/hero.html" title="Hero" scrolling="no"></iframe>
    <!-- 2 -->
    <div class="flow-pin" id="flowPin"><iframe class="section-frame flow-frame" id="flowFrame" src="index_files/flow.html" title="Flow" scrolling="no"></iframe></div>
    <!-- 3 -->
    <div class="services-pin" id="servicesPin"><iframe class="section-frame services-frame" id="servicesFrame" data-steps="5" src="index_files/Our Services.html" title="Our Services" scrolling="no"></iframe></div>
    <!-- 4 --><iframe class="section-frame" src="index_files/code.html" title="Code" scrolling="no"></iframe>
    <!-- 5 --><iframe class="section-frame" src="index_files/WhyChooseUs_preview.html" title="Why Choose Us" scrolling="no"></iframe>
    <!-- 6 --><iframe class="section-frame" src="Footer.html" title="Footer" scrolling="no"></iframe>

    <script>
        var frames = Array.prototype.slice.call(document.querySelectorAll('.section-frame'));
        var flowPin = document.getElementById('flowPin');
        var flowFrame = document.getElementById('flowFrame');
        var flowPinned = false; // desktop par true (sticky scrub), mobile par false

        // Flow ko pin/scrub setup -> baki sections normal auto-height
        function setupFlow() {
            var mobile = window.innerWidth <= 860;
            flowPinned = !mobile;
            if (mobile) {
                flowPin.style.height = 'auto';
                flowFrame.style.height = ''; // height message/measure se aayegi
            } else {
                flowPin.style.height = window.innerHeight + 'px'; // pin track = ek hi viewport, extra "dead" scroll na ho (stuck feel fix)
                flowFrame.style.height = window.innerHeight + 'px';
            }
        }

        // Scroll position -> flow progress (0..1) -> iframe ko bhejo (rAF-throttled = smooth)
        var flowTick = false;

        function flowScroll() {
            if (!flowPinned || !flowFrame.contentWindow) return;
            if (flowTick) return;
            flowTick = true;
            requestAnimationFrame(function() {
                flowTick = false;
                if (!flowPinned || !flowFrame.contentWindow) return;
                var total = flowPin.offsetHeight - window.innerHeight;
                var scrolled = Math.min(Math.max(-flowPin.getBoundingClientRect().top, 0), total);
                var p = total > 0 ? scrolled / total : 0;
                try {
                    flowFrame.contentWindow.postMessage({
                        ctFlowProgress: p
                    }, '*');
                } catch (e) {}
            });
        }

        // 1) Child se height aati hai -> us iframe ki height set (flow/services pinned ho to skip)
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.ctSection || !e.data.height) return;
            frames.forEach(function(f) {
                if (f.contentWindow !== e.source) return;
                if (f === flowFrame && flowPinned) return; // pinned flow ki height CSS handle karta hai
                if (f === servicesFrame && servicesPinned) return; // pinned services ki height CSS handle karta hai
                f.style.height = e.data.height + 'px';
            });
        });

        // 2) Har child ko parent ki viewport-height bhejo
        function pushParentVH() {
            frames.forEach(function(f) {
                try {
                    f.contentWindow.postMessage({
                        ctParentVH: window.innerHeight
                    }, '*');
                } catch (e) {}
            });
        }

        // 3) Fallback: same-origin par direct measure (flow/services pinned ho to skip)
        function measure(f) {
            if (f === flowFrame && flowPinned) return;
            if (f === servicesFrame && servicesPinned) return;
            try {
                var d = f.contentDocument || f.contentWindow.document;
                if (d && d.body) {
                    var b = d.body,
                        max = 0,
                        cs;
                    for (var i = 0; i < b.children.length; i++) {
                        cs = d.defaultView.getComputedStyle(b.children[i]);
                        if (cs.position === 'fixed' || cs.position === 'absolute' || cs.display === 'none') continue;
                        var bot = b.children[i].offsetTop + b.children[i].offsetHeight + (parseFloat(cs.marginBottom) || 0);
                        if (bot > max) max = bot;
                    }
                    var h = (max + (parseFloat(d.defaultView.getComputedStyle(b).paddingBottom) || 0)) || b.scrollHeight;
                    if (h > 0) f.style.height = h + 'px';
                }
            } catch (e) { /* cross-origin: postMessage path use hoga */ }
        }

        // Services section: same pin as Flow, but only ever pushes a message when
        // the active card INDEX actually changes (not on every scroll pixel). The
        // previous version pushed continuous progress every frame and the child
        // re-toggled classList every tick even when nothing changed — that's what
        // was stuttering. Now: cheap math every frame, DOM/message only on change.
        var servicesPin = document.getElementById('servicesPin');
        var servicesFrame = document.getElementById('servicesFrame');
        var servicesPinned = false; // desktop par true (pinned), mobile par false
        var servicesTick = false;
        var servicesLastIndex = -1;

        function setupServices() {
            var mobile = window.innerWidth <= 900;
            servicesPinned = !mobile;
            servicesLastIndex = -1;
            if (mobile) {
                servicesPin.style.height = 'auto';
                servicesFrame.style.height = ''; // height message/measure se aayegi
            } else {
                var steps = parseInt(servicesFrame.getAttribute('data-steps') || '5', 10);
                var multiplier = 1 + (steps - 1) * 0.55; // har step ke liye ~0.55 viewport scroll room
                servicesPin.style.height = (window.innerHeight * multiplier) + 'px';
                servicesFrame.style.height = window.innerHeight + 'px';
            }
        }

        function servicesScroll() {
            if (!servicesPinned || !servicesFrame.contentWindow) return;
            if (servicesTick) return;
            servicesTick = true;
            requestAnimationFrame(function() {
                servicesTick = false;
                if (!servicesPinned || !servicesFrame.contentWindow) return;
                var steps = parseInt(servicesFrame.getAttribute('data-steps') || '5', 10);
                var total = servicesPin.offsetHeight - window.innerHeight;
                var scrolled = Math.min(Math.max(-servicesPin.getBoundingClientRect().top, 0), total);
                var p = total > 0 ? scrolled / total : 0;
                var idx = Math.min(steps - 1, Math.floor(p * steps));
                if (idx === servicesLastIndex) return; // no change -> no message, no repaint
                servicesLastIndex = idx;
                try {
                    servicesFrame.contentWindow.postMessage({
                        ctServicesIndex: idx
                    }, '*');
                } catch (e) {}
            });
        }

        setupFlow();
        setupServices();

        window.addEventListener('scroll', servicesScroll, {
            passive: true
        });

        frames.forEach(function(f) {
            f.addEventListener('load', function() {
                try {
                    f.contentWindow.postMessage({
                        ctParentVH: window.innerHeight
                    }, '*');
                } catch (e) {}
                measure(f);
                setTimeout(function() {
                    measure(f);
                }, 400);
                setTimeout(function() {
                    measure(f);
                    flowScroll();
                    if (f === servicesFrame) servicesScroll();
                }, 1200);
            });
        });

        window.addEventListener('scroll', flowScroll, {
            passive: true
        });

        // Late layout (fonts/images) ke baad heights settle karo -> mobile ke whitespace gaps khatam
        window.addEventListener('load', function() {
            [300, 800, 1500, 2500].forEach(function(d) {
                setTimeout(function() {
                    pushParentVH();
                    frames.forEach(measure);
                    flowScroll();
                    servicesScroll();
                }, d);
            });
        });

        var t;
        window.addEventListener('resize', function() {
            clearTimeout(t);
            t = setTimeout(function() {
                setupFlow();
                setupServices();
                pushParentVH();
                frames.forEach(measure);
                flowScroll();
                servicesScroll();
            }, 150);
        });
    </script>

    <script src="crosstech-chatbot.js" defer></script>
</body>

</html>
