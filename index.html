<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossTecch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: clip;
            background: #e8eaf2;
        }
        /* iframe ke baseline/inline gap se bachne ke liye */

        iframe {
            display: block;
            vertical-align: top;
            border: 0;
        }
        /* Mobile: smooth scroll + momentum, theme bg taaki kahin white na jhanke */

        @media (max-width: 860px) {
            html {
                scroll-behavior: smooth;
            }
            body {
                background: #e8eaf2;
            }
            .section-frame {
                background: #e8eaf2;
            }
        }
        /* Har section ek seamless iframe hai.
       Edit karna ho to seedha us section ki .html file (index_files/) kholo. */

        .section-frame {
            display: block;
            width: 100%;
            border: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 600px;
            /* default; JS sahi height set karega */
        }
        /* Flow section = scroll-driven pinned track.
       Jaise page neeche scroll ho, andar ki pipeline horizontally aage badhti hai. */

        .flow-pin {
            position: relative;
            width: 100%;
        }

        .flow-pin .flow-frame {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: block;
            border: 0;
        }

        @media (max-width: 860px) {
            .flow-pin {
                height: auto !important;
            }
            .flow-pin .flow-frame {
                position: static;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <!-- ===== SECTION SEQUENCE (order yahan se control hota hai) ===== -->
    <!-- 1 --><iframe class="section-frame" src="index_files/hero.html" title="Hero" scrolling="no"></iframe>
    <!-- 2 -->
    <div class="flow-pin" id="flowPin"><iframe class="section-frame flow-frame" id="flowFrame" src="index_files/flow.html" title="Flow" scrolling="no"></iframe></div>
    <!-- 3 -->
    <iframe class="section-frame" id="servicesFrame" src="index_files/Our Services.html" title="Our Services" scrolling="no"></iframe>
    <!-- 4 --><iframe class="section-frame" src="index_files/code.html" title="Code" scrolling="no"></iframe>
    <!-- 5 --><iframe class="section-frame" src="index_files/WhyChooseUs_preview.html" title="Why Choose Us" scrolling="no"></iframe>
    <!-- 6 --><iframe class="section-frame" src="Footer.html" title="Footer" scrolling="no"></iframe>

    <script>
        var frames = Array.prototype.slice.call(document.querySelectorAll('.section-frame'));
        var flowPin = document.getElementById('flowPin');
        var flowFrame = document.getElementById('flowFrame');
        var flowPinned = false; // desktop par true (sticky scrub), mobile par false

        // Flow ko pin/scrub setup -> baki sections normal auto-height
        function setupFlow() {
            var mobile = window.innerWidth <= 860;
            flowPinned = !mobile;
            if (mobile) {
                flowPin.style.height = 'auto';
                flowFrame.style.height = ''; // height message/measure se aayegi
            } else {
                flowPin.style.height = window.innerHeight + 'px'; // pin track = ek hi viewport, extra "dead" scroll na ho (stuck feel fix)
                flowFrame.style.height = window.innerHeight + 'px';
            }
        }

        // Scroll position -> flow progress (0..1) -> iframe ko bhejo (rAF-throttled = smooth)
        var flowTick = false;

        function flowScroll() {
            if (!flowPinned || !flowFrame.contentWindow) return;
            if (flowTick) return;
            flowTick = true;
            requestAnimationFrame(function() {
                flowTick = false;
                if (!flowPinned || !flowFrame.contentWindow) return;
                var total = flowPin.offsetHeight - window.innerHeight;
                var scrolled = Math.min(Math.max(-flowPin.getBoundingClientRect().top, 0), total);
                var p = total > 0 ? scrolled / total : 0;
                try {
                    flowFrame.contentWindow.postMessage({
                        ctFlowProgress: p
                    }, '*');
                } catch (e) {}
            });
        }

        // 1) Child se height aati hai -> us iframe ki height set (pinned flow ke alawa; services ab normal frame hai)
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.ctSection || !e.data.height) return;
            frames.forEach(function(f) {
                if (f.contentWindow !== e.source) return;
                if (f === flowFrame && flowPinned) return; // pinned flow ki height CSS handle karta hai
                f.style.height = e.data.height + 'px';
            });
        });

        // 2) Har child ko parent ki viewport-height bhejo
        function pushParentVH() {
            frames.forEach(function(f) {
                try {
                    f.contentWindow.postMessage({
                        ctParentVH: window.innerHeight
                    }, '*');
                } catch (e) {}
            });
        }

        // 3) Fallback: same-origin par direct measure (pinned flow ke alawa)
        function measure(f) {
            if (f === flowFrame && flowPinned) return;
            try {
                var d = f.contentDocument || f.contentWindow.document;
                if (d && d.body) {
                    var b = d.body,
                        max = 0,
                        cs;
                    for (var i = 0; i < b.children.length; i++) {
                        cs = d.defaultView.getComputedStyle(b.children[i]);
                        if (cs.position === 'fixed' || cs.position === 'absolute' || cs.display === 'none') continue;
                        var bot = b.children[i].offsetTop + b.children[i].offsetHeight + (parseFloat(cs.marginBottom) || 0);
                        if (bot > max) max = bot;
                    }
                    var h = (max + (parseFloat(d.defaultView.getComputedStyle(b).paddingBottom) || 0)) || b.scrollHeight;
                    if (h > 0) f.style.height = h + 'px';
                }
            } catch (e) { /* cross-origin: postMessage path use hoga */ }
        }

        // Services section: normal (non-pinned) frame now. Each card inside it
        // reveals individually as it scrolls into view, driven by its own
        // position in the real viewport. Since the iframe itself never scrolls
        // internally (its whole tall canvas is rendered flat, sized to fit),
        // the parent just needs to forward where that canvas currently sits —
        // i.e. the iframe's own getBoundingClientRect().top — every rAF tick
        // the page scrolls, and the child works out each card's reveal amount
        // from that plus its own fixed internal layout position.
        var servicesFrame = document.getElementById('servicesFrame');
        var servicesTick = false;
        var servicesLastTop = null;

        function servicesScroll() {
            if (!servicesFrame.contentWindow) return;
            if (servicesTick) return;
            servicesTick = true;
            requestAnimationFrame(function() {
                servicesTick = false;
                if (!servicesFrame.contentWindow) return;
                var top = servicesFrame.getBoundingClientRect().top;
                if (servicesLastTop !== null && Math.abs(top - servicesLastTop) < 0.5) return; // no meaningful change
                servicesLastTop = top;
                try {
                    servicesFrame.contentWindow.postMessage({
                        ctServicesFrameTop: top
                    }, '*');
                } catch (e) {}
            });
        }

        setupFlow();

        window.addEventListener('scroll', servicesScroll, {
            passive: true
        });

        frames.forEach(function(f) {
            f.addEventListener('load', function() {
                try {
                    f.contentWindow.postMessage({
                        ctParentVH: window.innerHeight
                    }, '*');
                } catch (e) {}
                measure(f);
                setTimeout(function() {
                    measure(f);
                }, 400);
                setTimeout(function() {
                    measure(f);
                    flowScroll();
                    if (f === servicesFrame) servicesScroll();
                }, 1200);
            });
        });

        window.addEventListener('scroll', flowScroll, {
            passive: true
        });

        // Late layout (fonts/images) ke baad heights settle karo -> mobile ke whitespace gaps khatam
        window.addEventListener('load', function() {
            [300, 800, 1500, 2500].forEach(function(d) {
                setTimeout(function() {
                    pushParentVH();
                    frames.forEach(measure);
                    flowScroll();
                    servicesScroll();
                }, d);
            });
        });

        var t;
        window.addEventListener('resize', function() {
            clearTimeout(t);
            t = setTimeout(function() {
                setupFlow();
                pushParentVH();
                frames.forEach(measure);
                flowScroll();
                servicesScroll();
            }, 150);
        });
    </script>

    <script src="crosstech-chatbot.js" defer></script>
</body>

</html>
